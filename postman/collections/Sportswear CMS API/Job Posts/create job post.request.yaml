$kind: http-request
name: create job post
method: POST
url: "{{baseUrl}}/job-posts"
order: 2000
description: Creates a job post.
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "title": "Senior Backend Engineer",
      "description": "Build and maintain APIs for the sportswear CMS platform.",
      "company_id": 1,
      "category_id": 4
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Response has a successful status", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
    language: text/javascript
