$kind: http-request
method: GET
url: '{{baseUrl}}/job-posts/:jobPost'
order: 3000
description: 'Returns a single job post with nested company relation loaded.'
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: jobPost
    value: '1'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Response has a successful status", function () {
        pm.expect(pm.response.code).to.eql(200);
      });