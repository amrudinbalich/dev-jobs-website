$kind: http-request
method: GET
url: '{{baseUrl}}/companies'
order: 1000
description: 'Returns a collection of companies with nested job_posts relation loaded.'
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Response has a successful status", function () {
        pm.expect(pm.response.code).to.eql(200);
      });